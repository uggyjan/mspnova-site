<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" font-family="-apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, system-ui, sans-serif">
<defs>
  <linearGradient id="bgGrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0e1f3a"></stop><stop offset="1" stop-color="#091428"></stop></linearGradient>
</defs>
<rect width="1280" height="800" fill="url(#bgGrad)"></rect>
<rect x="0" y="0" width="1280" height="56" fill="#06101f"></rect>
  <rect x="0" y="55" width="1280" height="1" fill="#1f3358"></rect>
  <circle cx="32" cy="28" r="9" fill="#d45a3a"></circle>
  <text x="50" y="33" fill="#e6edf5" font-size="14" font-weight="700" letter-spacing="0.04em">NOVA</text>
  <g fill="#8a9bb4" font-size="12" font-weight="600">
    <text x="140" y="33">Home</text><text x="200" y="33">Triage</text>
    <text x="270" y="33">Needs Attention</text><text x="385" y="33">Dispatch Queue</text>
    <text x="495" y="33">Pulse</text><text x="555" y="33">Status</text>
    </g>
  <circle cx="1230" cy="28" r="14" fill="#16294a" stroke="#1f3358"></circle>
  <text x="1230" y="33" fill="#8a9bb4" font-size="11" font-weight="700" text-anchor="middle">A</text>
  <text x="1200" y="33" fill="#8a9bb4" font-size="11" text-anchor="end">Avery</text>

  
  <g transform="translate(340,200)">
    <rect width="600" height="400" rx="18" fill="#0c1c36" stroke="#1f3358"></rect>

    
    <g transform="translate(220,40)">
      <rect width="160" height="120" rx="12" fill="#0a1830" stroke="#d45a3a" stroke-dasharray="6 6" stroke-width="1.5"></rect>
      <text x="80" y="50" fill="#5e7392" font-size="11" font-weight="700" letter-spacing="0.08em" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">TICKET</text>
      <text x="80" y="84" fill="#d45a3a" font-size="36" font-weight="800" text-anchor="middle" font-family="ui-monospace,Menlo,monospace">T-404</text>
      <text x="80" y="106" fill="#5e7392" font-size="10" text-anchor="middle">status: lost</text>
    </g>

    <text x="300" y="218" fill="#e6edf5" font-size="32" font-weight="700" text-anchor="middle">Ticket not found</text>
    <text x="300" y="246" fill="#8a9bb4" font-size="14" text-anchor="middle">The page you&#39;re looking for got dispatched somewhere else.</text>
    <text x="300" y="266" fill="#8a9bb4" font-size="14" text-anchor="middle">It may have been resolved, merged, or never existed.</text>

    
    <g transform="translate(160,300)">
      <rect width="130" height="44" rx="10" fill="#16294a" stroke="#1f3358"></rect>
      <text x="65" y="29" fill="#a9b8d0" font-size="12" font-weight="600" text-anchor="middle">← Back to home</text>

      <rect x="148" y="0" width="130" height="44" rx="10" fill="#d45a3a"></rect>
      <text x="213" y="29" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">Open new ticket</text>
    </g>

    
    <g transform="translate(40,376)">
      <text x="0" y="0" fill="#5e7392" font-size="10" font-family="ui-monospace,Menlo,monospace">error: 404 · path: /requested-url · time: 10:47:32 PST</text>
    </g>
  </g>

  
  <g opacity="0.15">
    <rect x="80" y="160" width="120" height="80" rx="8" fill="#1f3358" transform="rotate(-8 140 200)"></rect>
    <rect x="1080" y="200" width="120" height="80" rx="8" fill="#1f3358" transform="rotate(12 1140 240)"></rect>
    <rect x="120" y="600" width="120" height="80" rx="8" fill="#1f3358" transform="rotate(6 180 640)"></rect>
    <rect x="1040" y="580" width="120" height="80" rx="8" fill="#1f3358" transform="rotate(-10 1100 620)"></rect>
  </g>

  
  <text x="640" y="730" fill="#5e7392" font-size="11" text-anchor="middle">Nova is still up and running normally · this was just one missing page</text>

</svg>