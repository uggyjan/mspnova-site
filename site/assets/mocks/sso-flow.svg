<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" preserveAspectRatio="xMidYMid slice" font-family="-apple-system, BlinkMacSystemFont, &#39;Segoe UI&#39;, system-ui, sans-serif">
  <rect width="1280" height="800" fill="#f5f6f8"></rect>

  
  <rect x="0" y="0" width="500" height="800" fill="#1e40af"></rect>
  <rect x="40" y="40" width="32" height="32" rx="8" fill="#fff"></rect>
  <text x="56" y="62" fill="#1e40af" font-size="18" font-weight="800" text-anchor="middle">A</text>
  <text x="84" y="62" fill="#fff" font-size="16" font-weight="700">Acme IT Support</text>

  <text x="40" y="280" fill="#fff" font-size="40" font-weight="700">Sign in with</text>
  <text x="40" y="324" fill="#fff" font-size="40" font-weight="700">your Acme</text>
  <text x="40" y="368" fill="#fff" font-size="40" font-weight="700">Microsoft account</text>
  <text x="40" y="416" fill="#bfdbfe" font-size="15" line-height="1.5">No new password to remember. We use the</text>
  <text x="40" y="438" fill="#bfdbfe" font-size="15">login you already have for email.</text>

  <text x="40" y="740" fill="#bfdbfe" font-size="11">Powered by Techital MSP · Hosted in US-West-2</text>
  <text x="40" y="758" fill="#bfdbfe" font-size="11" opacity="0.7">SOC 2 Type II · ISO 27001 · GDPR-ready</text>

  
  <g transform="translate(640,200)">
    <rect width="500" height="400" rx="20" fill="#fff" stroke="#e2e8f0"></rect>

    
    <text x="40" y="56" fill="#0f172a" font-size="20" font-weight="600">Sign in</text>
    <text x="40" y="84" fill="#64748b" font-size="14">to continue to Acme IT Support Portal</text>

    
    <g transform="translate(40,112)">
      <rect width="420" height="56" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"></rect>
      
      <g transform="translate(20,18)">
        <rect width="9" height="9" fill="#f25022"></rect>
        <rect x="11" width="9" height="9" fill="#7fba00"></rect>
        <rect y="11" width="9" height="9" fill="#00a4ef"></rect>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"></rect>
      </g>
      <text x="60" y="35" fill="#0f172a" font-size="14" font-weight="600">Continue with Microsoft</text>
      <text x="60" y="50" fill="#64748b" font-size="11">halden.b@acme.com</text>
      <text x="395" y="35" fill="#94a3b8" font-size="20" text-anchor="end">›</text>
    </g>

    
    <line x1="40" y1="200" x2="220" y2="200" stroke="#e2e8f0"></line>
    <text x="250" y="204" fill="#94a3b8" font-size="11" text-anchor="middle">or</text>
    <line x1="280" y1="200" x2="460" y2="200" stroke="#e2e8f0"></line>

    
    <g transform="translate(40,220)">
      <rect width="420" height="48" rx="10" fill="#f8fafc" stroke="#cbd5e1"></rect>
      <text x="20" y="30" fill="#475569" font-size="13">halden.b@acme.com</text>
    </g>
    <g transform="translate(40,278)">
      <rect width="420" height="44" rx="10" fill="#0f172a"></rect>
      <text x="210" y="28" fill="#fff" font-size="13" font-weight="600" text-anchor="middle">Email me a sign-in link</text>
    </g>

    <text x="250" y="356" fill="#94a3b8" font-size="11" text-anchor="middle">Trouble signing in? helpdesk@techitalmsp.com</text>
  </g>

  
  <g transform="translate(640,640)">
    <rect width="500" height="80" rx="14" fill="#f0fdf4" stroke="#86efac"></rect>
    <circle cx="32" cy="40" r="14" fill="#22c55e"></circle>
    <path d="M26 40l4 4 8-8" stroke="#fff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"></path>
    <text x="60" y="38" fill="#15803d" font-size="13" font-weight="700">Acme tenant verified · Entra ID</text>
    <text x="60" y="58" fill="#166534" font-size="11">domain: acmeholdings.com · 247 users provisioned · auto-sync nightly</text>
  </g>
