      <rect x="0" y="14" width="752" height="86" rx="8" fill="#0a1830" stroke="#1f3358"></rect>
      <text x="20" y="46" fill="#22c55e" font-size="28" font-weight="700" font-family="ui-monospace,Menlo,monospace">14</text>
