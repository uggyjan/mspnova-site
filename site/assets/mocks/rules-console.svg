      <rect x="248" y="142" width="80" height="22" rx="4" fill="#16294a"></rect>
      <text x="288" y="157" fill="#a9b8d0" font-size="11" text-anchor="middle">+ Avery</text>
    </g>

    
    <g transform="translate(24,398)">
