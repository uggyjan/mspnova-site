  <text x="50" y="33" fill="#e6edf5" font-size="14" font-weight="700" letter-spacing="0.04em">NOVA</text>
  <g fill="#8a9bb4" font-size="12" font-weight="600"><text x="140" y="33" fill="#8a9bb4">Home</text><text x="200" y="33" fill="#e6edf5">Triage</text><rect x="195" y="40" width="42" height="2" fill="#d45a3a"></rect><text x="270" y="33" fill="#8a9bb4">Needs Attention</text><text x="385" y="33" fill="#8a9bb4">Dispatch Queue</text><text x="495" y="33" fill="#8a9bb4">Pulse</text><text x="555" y="33" fill="#8a9bb4">Status</text></g>
  <circle cx="1230" cy="28" r="14" fill="#16294a" stroke="#1f3358"></circle>
