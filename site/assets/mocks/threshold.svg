  <text x="1200" y="33" fill="#8a9bb4" font-size="11" text-anchor="end">Avery</text>

  <text x="40" y="108" fill="#e6edf5" font-size="22" font-weight="700">Confidence thresholds</text>
  <text x="40" y="130" fill="#8a9bb4" font-size="12">Auto-route tickets above the line. Held tickets land in the review queue for Avery.</text>

  
  <g transform="translate(40,160)">
